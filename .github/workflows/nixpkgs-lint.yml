name: nixpkgs-lint

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    name: nixpkgs-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v20
        with:
          nix_path: "nixpkgs=https://nixos.org/channels/nixos-23.11/nixpkgs"

      - name: Run nixpkgs-lint
        run: |
          nix profile install nixpkgs#nixpkgs-lint
          nix run nixpkgs#nixpkgs-lint -- .
